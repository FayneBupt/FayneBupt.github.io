<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .txt { font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .small { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #374151; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; }
      .decision { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .lane { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.6; rx: 14; }
      .laneTitle { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .arrow { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#m); }
      .labelYes { fill: #065f46; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .labelNo { fill: #9a3412; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <text x="40" y="52" class="title">Paimon incremental-between 扫描路径图</text>

  <rect class="box" rx="12" x="60" y="86" width="320" height="56"/>
  <text class="txt" x="88" y="121">scan.mode = incremental</text>
  <line class="arrow" x1="380" y1="114" x2="500" y2="114"/>
  <rect class="box" rx="12" x="500" y="86" width="430" height="56"/>
  <text class="txt" x="538" y="121">createIncrementalStartingScanner()</text>

  <rect class="lane" x="40" y="190" width="420" height="560"/>
  <text class="laneTitle" x="62" y="222">A. incremental-between（snapshot/tag）</text>
  <rect class="decision" points="" x="90" y="252" width="320" height="64" rx="10"/>
  <text class="txt" x="120" y="292">start/end 是 tag 吗？</text>
  <rect class="box" rx="10" x="70" y="370" width="340" height="72"/>
  <text class="txt" x="96" y="408">YES → tag-to-snapshot = true</text>
  <text class="small" x="96" y="428">IncrementalDeltaStartingScanner</text>
  <rect class="box" rx="10" x="70" y="470" width="340" height="72"/>
  <text class="txt" x="96" y="508">YES → tag-to-snapshot = false</text>
  <text class="small" x="96" y="528">IncrementalDiffStartingScanner</text>
  <rect class="decision" points="" x="90" y="570" width="320" height="64" rx="10"/>
  <text class="txt" x="128" y="610">NO → scan-mode = diff ?</text>
  <rect class="box" rx="10" x="70" y="660" width="340" height="72"/>
  <text class="txt" x="96" y="698">YES → IncrementalDiffStartingScanner</text>
  <text class="small" x="96" y="718">NO → IncrementalDeltaStartingScanner</text>
  <line class="arrow" x1="250" y1="316" x2="250" y2="370"/>
  <line class="arrow" x1="250" y1="316" x2="250" y2="470"/>
  <line class="arrow" x1="250" y1="316" x2="250" y2="570"/>
  <text class="labelYes" x="262" y="352">YES</text>
  <text class="labelNo" x="262" y="560">NO</text>
  <line class="arrow" x1="250" y1="634" x2="250" y2="660"/>

  <rect class="lane" x="490" y="190" width="420" height="560"/>
  <text class="laneTitle" x="512" y="222">B. incremental-between-timestamp</text>
  <rect class="decision" points="" x="540" y="252" width="320" height="64" rx="10"/>
  <text class="txt" x="590" y="292">scan-mode = diff ?</text>
  <rect class="box" rx="10" x="540" y="370" width="320" height="72"/>
  <text class="txt" x="564" y="408">YES → IncrementalDiffStartingScanner</text>
  <rect class="box" rx="10" x="540" y="470" width="320" height="72"/>
  <text class="txt" x="564" y="508">NO → IncrementalDeltaStartingScanner</text>
  <line class="arrow" x1="700" y1="316" x2="700" y2="370"/>
  <line class="arrow" x1="700" y1="316" x2="700" y2="470"/>
  <text class="labelYes" x="714" y="352">YES</text>
  <text class="labelNo" x="714" y="452">NO</text>

  <rect class="lane" x="940" y="190" width="420" height="560"/>
  <text class="laneTitle" x="962" y="222">C. incremental-to-auto-tag</text>
  <rect class="box" rx="10" x="990" y="282" width="320" height="84"/>
  <text class="txt" x="1012" y="322">固定路径：</text>
  <text class="small" x="1012" y="346">IncrementalDiffStartingScanner</text>
  <rect class="box" rx="10" x="990" y="400" width="320" height="92"/>
  <text class="small" x="1012" y="434">end tag 不存在，或找不到更早 auto tag：</text>
  <text class="txt" x="1012" y="460">返回空结果</text>

  <line class="arrow" x1="715" y1="142" x2="250" y2="190"/>
  <line class="arrow" x1="715" y1="142" x2="700" y2="190"/>
  <line class="arrow" x1="715" y1="142" x2="1150" y2="190"/>

  <rect class="box" rx="12" x="40" y="800" width="1320" height="130"/>
  <text class="txt" x="70" y="842">结论：</text>
  <text class="small" x="70" y="872">1) auto 只会映射到 delta/changelog；2) diff 是独立路径；3) tag 默认分支走 diff（tag-to-snapshot=false）。</text>
  <text class="small" x="70" y="898">4) incremental-to-auto-tag 固定是 diff 语义。</text>
</svg>
